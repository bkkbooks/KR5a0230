body:
  text: 九還七返龍虎金丹析理真訣諸眞論還丹訣九還七返龍虎金丹析理真訣武昌程昭字士眀述余於道門酷於留意曽覧仙經至於爐火百家粗曾披閱因看洞元記總途經混元訣金碧經玉壺龍胎鳯翅及太一參同等文分析火候指掌九還七返金液還丹有三修用實繁互達深逺元機非遥學者萬數成無一焉皆為鉛汞難分黃芽罔識從兹悮失莫暁宗元以此為迷積有歳矣時於大宋壬申中春遇四明山野客因留宿乃問金液還丹之理道人云此事至難至易不可輕問余乃再懇之道人曰或説金華爲黄芽將礦悞作真鉛如此之人萬無一成也且黄芽者是五行之筋髓真鉛即太一之真精生於混沌之中起自太初之内生乎天地之始先能作衆物之母夫大丹均五行之勝齊天地之功余乃再拜曰敢問金液還丹所起如何道人曰金丹所起起於太初太始生混沌混沌生兩儀兩儀立三才三才運八卦八卦滋九宮九宮則丹之終則太一之始先也敢問太始之名願乞師指於藥中是何物道人日是真鉛也鉛是水之精水是隂之體隂極則陽生變化萬物也無腸不生腸去即死將欲變化故先立陽陽之生也其在杳㝠人莫知道經云杳杳㝠㝠其中有精其精甚真之謂也又參同擬周易是地雷復卦太陽生於子為十一月卦故天地神功將欲雕鎪萬卉發敷千花故納腸爻於隂極之時籍太隂之盛賛㣲陽之功此乃太始之義也世人不知金丹從太始妄服金石欲求變化者如灌彩汁於地欲染花木之形又再拜問太始生混沌者何物道人曰混沌者不開盈之貌也外白裏黃猶如鷄子也旣隂陽而合精氣未交故曰混沌也又問曰未委混沌之名於藥中是何類也是崔真入龍胎經中之義也鉛汞初合龍虎初親日月相交隂陽相感故丹生混沌也月吐其彩日舒其光龍納其胎虎泄其氣如金碧之寢寐神明相抱覺悟後存已是龍舒其氣虎吐其精神室相著不相離也如抱元經云含元受氣物無不濟得氣受元物無不全且如世問之物不含識則抱元未有捨元識而得成形質者也世人不知龍虎之根基隂腸之化本妄投金石擬造還丹寔爲却歩而求前迎日而避影故魏真君曰入水求雞兔登山索魚龍誠哉是言又參同之哀憫後生好道之倫探訪風教指盡古文子繼父業孫踵祖先此明含元禀氣也又言覆雞當用卵又種禾即生禾又云鷰雀不生鳯狐兔不乳馬此之謂也世人不知含元抱胎之道遠方求藥煎金鍊石若以五金八石得成大丹者則魏真人不作參同契崔真人不明太一圖參同以二氣相盪八卦相推寒暑迭居隂陽開闔二氣失度萬物不滋五行越常萬靈失序豈肯大丹容雜類而成乎又如太一圖云太一遊九宮而不入中位若明太一則水中也中宮則土也土爲水鬼故惡中宮而不入也如丹遊八卦後入中宮成黄金之熟諸將在太一左右爲近必有移曆之象以太一喻汞諸將喻金石明大藥不用金石藥也又諸同宮爲囚有不可之事以知龍胎大丹不入雜類也又明子午爲易氣即卵酉爲絶氣此乃皆是丹之節符也又問曰何謂爲兩儀道人曰兩儀者天地剖判也分形也隂陽各有其位日東月西離南坎北又問曰未委兩儀在藥成何氣象道人曰兩儀在藥中是鉛汞各相分也兩儀旣定生在天則日月星在藥則三五一藥之到比神化非遥又問曰何名是三五一道人曰一是水二是火乃共三凡有三而自懷五也比乃是水火土又名鉛汞鼎也亦名三物一體亦名一物三形烟蘿子曰三一之道也大丹之中唯金水土爾又問曰未委金水土如何分别道人曰金者鉛也鉛者真金眞土也且非是世間鉛生於太虛杳㝠之内是太一之真精坎中之一晝也故曰天得一以清地得一以寜人得一以靈天欲靈於人莫過學長生不死之道也老子曰子得一萬事畢也上代神仙唯祕鉛之一色故古歌曰鉛若是真不失家臣鉛若不真與汞難親分鉛之與汞是一家之物也又龍巢經云夫聖人受命必有同心德爾是一家之物也耳目股肱其潜也神鬼莫之其升也天地合力將喻鉛汞是一家之物非外來雜類可成也古歌曰南北路交差朦朧是一家世人多將金銀鉛錫笋銀芽金蛺蝶金蟻爲鉛成丹藥可諸灌朽求花鑚冰待火不明衆類者哉亦不識其宗枝萬萬千千一無成矣且前諸物並是頑物硬死質豈有神通變化易髓換筋乎故參同契曰狐兔不乳馬燕雀不生鳳此之謂也又曰同類易施功異類難爲巧又曰雞抱卵兮日數足母生子兮十月全植禾當用粟履雞當用卵也且世間十二種鉛皆非大藥之用黒鉛黄丹鉛嘉州鉛生鉛草節鉛隴陀鉛白錫鉛銀鉛金爍鉛巳上皆是世間死質頑滯之物縱强服之皆隨大腸而下豈有長生久視不死之道乎問曰世間鉛旣不堪服餌未委眞鉛從何而得道人曰真鉛土從無入有禀天地而成形託日月而無質其君臣合會父母生育起參銖之杪及成斤之靈骨肉雙全血脉盈滿汞之一見則立伏焉故青霞子日情合無衆藥氣合無言語斯之謂也又問曰汞之所出何者堪成道人曰夫汞土亦有數般故有自然汞白砂汞丹砂汞修丹只用丹砂汞且砂之數種類亦有多般故有天座砂神座砂紫靈砂光眀砂商砂鐡見砂溪砂土砂其天座玉座金座神座等皆是自然還丹不假燒煉服之成仙諸天仙衆駕鶴乗龍而來取之世人莫得而見也其光明紫靈砂等則堪成大藥其商砂土砂不堪服食唯修利術則可矣又問曰不知土是何物也道人曰夫土一味真義極元亦非世間之土也世人多以硫黄雄黃雌黃砒黃宻陀僧銀笋鉛黄花白銀黄金以爲其土将偃於水皆非其用也且土無正形遇氣則生得勢便成故生於四孟王於四季絕於四仲鎮安中宮寄生丙丁與水同氣略將前物爲真土其源還與水同炁乎其真土者是五行之真精須假神合達造變化生育故得與乾坤合體神化無窮則堪與丹爲宅也又問曰金水土合成大丹藥味至寡其功不多未委幾日而熟用鼎器道人曰叅同云初七十終三旬三百六十善調匀則一載而成也此乃太一周天也旣不會太一周天無由得大丹成熟也魏真人論周天之數大而論之一年小而諭之一日故年與月同月與日同日與時問時運養周星法只以一日夜爲一周星也青霞子曰鼎鼎非金鼎鑪鑪非藥爐離從坎下發汞在土中居固濟胎不泄變化在須臾則不煩速求鼎器也古歌曰日日只在君家舍知白守黑神明著矣敢問知白守黑如何道人曰白者金之精黑者水之基此二味天地之大寳日月之至精象君臣父子夫婦女男敢再問修丹起首次序幸垂指訣道人曰夫金丹須抱元結胎敷花實子返本還元之謂也又烟蘿子曰深根同帶則長生久視之道也又曰根深則花茂子實故君子務本本立而道生内若契道金丹自至無不形影相隨聲響相應也道人曰始自於砂砂變成汞汞變成金金變成液液化丹故謂之金液還丹丹者赤色也還其土復還元也故返木還其源也故元陽子曰金化金兮銀化銀何曽別有別聖神自然伏火者百煉不燼入水中如膏入火成金入口而化其味甘香豈將世間雜類金石華木有如斯神化乎又問曰如何是含兀胎敷花結實道人曰結龍胎鍊虎精也神水育黄芽自三皇以來皆口口相傅不留文字恐洩天機妄說者沉淪三劫吾子晦而勿言又問曰幸所指敎以見宗元即入用不多鼎藥易置欲依法修煉得否道人曰夫燒丹者須三備則可成矣三備者一福二徳三志無福不成如龍虎經云丹熟視之丘陵冢墓枯骨形象者彼不堪服食須棄中流依法別燒此爲無福之應也無德不能苞貯藴藏如趙元伯將丹訣贄燕中太子太子好貨入造金銀鑄鼎器燒外藥其藥未成而太子怒使沈元伯於井中斯無德之應無志則不能苦學似有小失則生大悔如河中二薛令造丹不成所有家中道門書䇿及燒藥器真悉皆焚毀於道路逢著道流乃拔劔苦逐曰噓誕之徒宜去之俄而墜馬而死斯亦無志也吾子雖執其志福德未圎宜訪巨福廣德之人共成之則可矣又問曰上言妄説者沈之三劫今令訪人同修莫違神誡道人曰夫三人共志自古来然不得妄説也故三人者金水土也三人巳上則爲妄説君子一依余論抄集繕寫次第縁由運動配合時候感應流布世間有縁自遇其於口訣則口口相傳心心相授勿違神誡斯須達曙即乃告辭莫知所徃余承奉道人指訣一一條録傳諸好道幸無棄焉九還七返龍虎金丹析理真訣終
